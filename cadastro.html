<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Veículo | AutoGestão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Auto<span>Gestão</span></a>
        <div class="nav-links">
            <a href="index.html">Início</a>
            <a href="cadastro.html" class="active">Cadastrar</a>
            <a href="listagem.html">Consultar</a>
        </div>
    </nav>

    <main class="container">
        <div class="glass-card">
            <h2>Novo Cadastro de Veículo</h2>
            <form id="formCadastro">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="placa">Placa</label>
                        <input type="text" id="placa" name="placa" placeholder="ABC-1234" required>
                    </div>
                    <div class="form-group">
                        <label for="marca">Marca</label>
                        <input type="text" id="marca" name="marca" placeholder="Ex: Toyota" required>
                    </div>
                    <div class="form-group">
                        <label for="modelo">Modelo</label>
                        <input type="text" id="modelo" name="modelo" placeholder="Ex: Corolla" required>
                    </div>
                    <div class="form-group">
                        <label for="ano_fabricacao">Ano de Fabricação</label>
                        <input type="number" id="ano_fabricacao" name="ano_fabricacao" required>
                    </div>
                    <div class="form-group">
                        <label for="ano_modelo">Ano do Modelo</label>
                        <input type="number" id="ano_modelo" name="ano_modelo" required>
                    </div>
                    <div class="form-group">
                        <label for="cor">Cor</label>
                        <input type="text" id="cor" name="cor" required>
                    </div>
                    <div class="form-group">
                        <label for="combustivel">Combustível</label>
                        <select id="combustivel" name="combustivel" required>
                            <option value="">Selecione...</option>
                            <option value="Gasolina">Gasolina</option>
                            <option value="Etanol">Etanol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Flex">Flex</option>
                            <option value="Elétrico">Elétrico</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="quilometragem">Quilometragem</label>
                        <input type="number" id="quilometragem" name="quilometragem" required>
                    </div>
                    <div class="form-group">
                        <label for="chassi">Chassi</label>
                        <input type="text" id="chassi" name="chassi" required>
                    </div>
                    <div class="form-group">
                        <label for="renavam">Renavam</label>
                        <input type="text" id="renavam" name="renavam" required>
                    </div>
                    <div class="form-group">
                        <label for="data_cadastro">Data de Cadastro</label>
                        <input type="date" id="data_cadastro" name="data_cadastro" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.5rem;">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn">Salvar Veículo</button>
            </form>
            <div id="mensagem" style="margin-top: 1rem; font-weight: 600;"></div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
